name: Benchmarks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ------------------------------------------------------------------ #
  #  Criterion micro-benchmarks                                          #
  # ------------------------------------------------------------------ #
  criterion:
    name: Criterion Benchmarks
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libclang-dev clang llvm-dev \
            librocksdb-dev libsnappy-dev liblz4-dev libzstd-dev \
            protobuf-compiler libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Criterion benchmarks
        run: |
          cargo bench --workspace --no-fail-fast 2>&1 | tee bench-results.txt || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: criterion-benchmarks
          path: |
            bench-results.txt
            target/criterion/
          retention-days: 30

  # ------------------------------------------------------------------ #
  #  PQ signature throughput benchmark                                   #
  # ------------------------------------------------------------------ #
  pq-throughput:
    name: PQ Signature Throughput
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libclang-dev clang llvm-dev libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-pq-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Build bleep-crypto in release mode
        run: cargo build -p bleep-crypto --release --all-features

      - name: Run SPHINCS+ throughput test
        run: |
          cargo test -p bleep-crypto --release --all-features \
            -- bench --nocapture 2>&1 | tee pq-throughput.txt || true
          echo ""
          echo "=== PQ Throughput Summary ==="
          grep -E "(sign|verify|keygen|ns/iter|throughput)" pq-throughput.txt || \
            echo "No throughput data captured — add #[bench] tests to bleep-crypto"

      - name: Upload PQ throughput results
        uses: actions/upload-artifact@v4
        with:
          name: pq-throughput-results
          path: pq-throughput.txt
          retention-days: 30

  # ------------------------------------------------------------------ #
  #  Post benchmark summary as PR comment                                #
  # ------------------------------------------------------------------ #
  comment:
    name: Post Benchmark Summary
    runs-on: ubuntu-22.04
    needs: [criterion, pq-throughput]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Download benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          path: bench-artifacts/

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 📊 Benchmark Results\n\n';

            try {
              const criterion = fs.readFileSync(
                'bench-artifacts/criterion-benchmarks/bench-results.txt', 'utf8'
              );
              body += '### Criterion\n```\n' + criterion.slice(-3000) + '\n```\n\n';
            } catch(e) {
              body += '### Criterion\n_No criterion output captured_\n\n';
            }

            try {
              const pq = fs.readFileSync(
                'bench-artifacts/pq-throughput-results/pq-throughput.txt', 'utf8'
              );
              body += '### PQ Cryptography Throughput\n```\n' + pq.slice(-2000) + '\n```\n';
            } catch(e) {
              body += '### PQ Cryptography Throughput\n_No throughput data captured_\n';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
